<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Social App</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial; margin: 16px; background:#0b0f19; color:#e8eefc; }
    .wrap { max-width: 1100px; margin: 0 auto; display:grid; grid-template-columns: 420px 1fr; gap:16px; }
    @media (max-width: 900px) { .wrap { grid-template-columns: 1fr; } }
    .card { background:#0f172a; border:1px solid #26324f; border-radius:12px; padding:16px; }
    h2 { margin:0 0 12px; font-size:18px; }
    label { font-size: 13px; opacity:.9; font-weight:700; display:block; margin-top:10px; }
    input, textarea, button { width:100%; border-radius:10px; padding:10px; border:1px solid #2b3550; background:#0b1220; color:#e8eefc; }
    textarea { min-height: 70px; resize: vertical; }
    button { cursor:pointer; background:#2563eb; border-color:#2563eb; font-weight:900; margin-top:12px; }
    button.secondary { background:#1f2937; border-color:#374151; font-weight:800; }
    hr { border:none;border-top:1px solid #26324f; margin:16px 0; }
    .row { display:flex; gap:10px; }
    .row > div { flex:1; }
    .muted { font-size:12px; opacity:.75; margin-top:10px; }
    .err { color:#ff6b6b; font-weight:900; margin-top:8px; white-space:pre-wrap; }
    .ok { color:#63ffb1; font-weight:900; margin-top:8px; white-space:pre-wrap; }
    .feed { display:flex; flex-direction:column; gap:16px; }
    .post { padding:14px; border:1px solid #26324f; border-radius:14px; background:#0f172a; }
    .meta { font-size:12px; opacity:.85; margin-bottom:10px; }
    img, video { max-width: 100%; border-radius:12px; display:block; margin: 10px 0 0; }
    .actions { display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-top:10px; }
    .pill { padding:6px 10px; border-radius:999px; border:1px solid #26324f; background:#0b1220; font-size: 13px; }
    .commentBox { border-top:1px solid #26324f; margin-top:12px; padding-top:12px; }
    .commentItem { border:1px solid #26324f; border-radius:12px; padding:10px; margin-top:8px; background:#0b1220; }
    .smallBtn { width:auto; padding:10px 14px; margin-top:0; }
    .inlineRow { display:flex; gap:10px; align-items:center; }
    .inlineRow input { flex:1; margin-top:0; }
    .hide { display:none; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card" id="authCard">
      <h2>Connexion / Inscription</h2>

      <!-- Signup -->
      <div id="signupForm">
        <label>Username (pseudo)</label>
        <input id="su_username" placeholder="ex: toto" />

        <label>Prénom (optionnel)</label>
        <input id="su_first" placeholder="Prénom" />

        <label>Nom (optionnel)</label>
        <input id="su_last" placeholder="Nom" />

        <label>Email</label>
        <input id="su_email" type="email" placeholder="email@exemple.com" />

        <label>Mot de passe</label>
        <input id="su_password" type="password" placeholder="••••••••" />

        <button id="btnSignup">Créer mon compte</button>
        <div id="signupMsg" class="muted"></div>
      </div>

      <hr />

      <!-- Login -->
      <div id="loginForm">
        <h2 style="margin-top:0;">Connexion</h2>

        <label>Email</label>
        <input id="li_email" type="email" placeholder="email@exemple.com" />

        <label>Mot de passe</label>
        <input id="li_password" type="password" placeholder="••••••••" />

        <button id="btnLogin" class="secondary">Se connecter</button>

        <div style="display:flex; gap:10px; margin-top:12px;">
          <button id="btnReset" class="secondary smallBtn" type="button">Mot de passe oublié</button>
          <button id="btnLogout" class="secondary smallBtn hide" type="button">Déconnexion</button>
        </div>

        <div id="loginMsg" class="muted"></div>
      </div>

      <div class="muted" id="authSummary" style="margin-top:12px;"></div>
    </div>

    <!-- Feed -->
    <div>
      <div class="card" style="margin-bottom:16px;">
        <h2 style="margin-top:0;">Publier</h2>

        <label>Caption (optionnel)</label>
        <textarea id="caption" placeholder="Écris un texte..."></textarea>

        <label>Image ou vidéo</label>
        <input id="mediaFile" type="file" accept="image/*,video/*"/>

        <button id="btnPublish">Publier</button>
        <div id="pubMsg" class="muted"></div>
      </div>

      <div class="feed" id="feed"></div>
    </div>
  </div>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

    // ====== REMPLACE ICI ======
    const SUPABASE_URL = "https://wtsmekozfpeaixqobuik.supabase.co";
    const SUPABASE_ANON_KEY = "REMPLACE_ANNON_KEY";
    // ===========================

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: { persistSession: true, autoRefreshToken: true }
    });

    const $ = (id) => document.getElementById(id);

    const authSummary = $("authSummary");
    const feed = $("feed");

    const signupForm = $("signupForm");
    const signupMsg = $("signupMsg");

    const loginMsg = $("loginMsg");

    const btnSignup = $("btnSignup");
    const btnLogin = $("btnLogin");
    const btnLogout = $("btnLogout");
    const btnReset = $("btnReset");

    const btnPublish = $("btnPublish");
    const pubMsg = $("pubMsg");

    const captionEl = $("caption");
    const mediaFileEl = $("mediaFile");

    const su_username = $("su_username");
    const su_first = $("su_first");
    const su_last = $("su_last");
    const su_email = $("su_email");
    const su_password = $("su_password");

    const li_email = $("li_email");
    const li_password = $("li_password");

    function escapeHtml(s) {
      return String(s ?? "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    function fileMediaType(file) {
      if (!file) return null;
      if (file.type.startsWith("image/")) return "image";
      if (file.type.startsWith("video/")) return "video";
      return null;
    }

    async function getMyProfile() {
      const { data: { user } } = await supabase.auth.getUser();
      if (!user) return null;

      const { data, error } = await supabase
        .from("profiles")
        .select("*")
        .eq("id", user.id)
        .single();

      if (error) throw error;
      return data;
    }

    async function loadFeed() {
      feed.innerHTML = "";

      const { data: posts, error } = await supabase
        .from("posts")
        .select("*")
        .order("created_at", { ascending: false });

      if (error) throw error;

      if (!posts || posts.length === 0) {
        feed.innerHTML = "<div class='muted'>Aucune publication pour le moment.</div>";
        return;
      }

      const { data: likes, error: likesErr } = await supabase
        .from("likes")
        .select("post_id,user_id");

      if (likesErr) throw likesErr;

      const likesByPost = {};
      for (const l of (likes || [])) {
        likesByPost[l.post_id] = (likesByPost[l.post_id] || 0) + 1;
      }

      const my = await supabase.auth.getUser();
      const myUserId = my.data.user?.id || null;

      function likedByMe(postId) {
        if (!myUserId) return false;
        return (likes || []).some(l => l.post_id === postId && l.user_id === myUserId);
      }

      for (const p of posts) {
        const card = document.createElement("div");
        card.className = "post";

        card.innerHTML = `
          <div class="meta"><b>${escapeHtml(p.user_username || "Utilisateur")}</b> • ${new Date(p.created_at).toLocaleString()}</div>

          ${p.caption ? `<div style="font-weight:900; margin-top:6px;">${escapeHtml(p.caption)}</div>` : ""}

          ${
            p.media_url
              ? (p.media_type === "video"
                  ? `<video src="${escapeHtml(p.media_url)}" controls playsinline></video>`
                  : `<img src="${escapeHtml(p.media_url)}" alt="media" />`)
              : ""
          }

          <div class="actions">
            <button class="secondary smallBtn" data-like="${p.id}">${likedByMe(p.id) ? "❤️ Aimé" : "❤️ Like"}</button>
            <span class="pill">${likesByPost[p.id] || 0} likes</span>
          </div>

          <div class="commentBox">
            <div class="inlineRow">
              <input data-comment-input="${p.id}" placeholder="Écrire un commentaire..." />
              <button class="secondary smallBtn" data-comment-send="${p.id}">Envoyer</button>
            </div>
            <div data-comments="${p.id}" style="margin-top:10px;"></div>
          </div>
        `;

        feed.appendChild(card);

        // Load comments per post
        await (async () => {
          const { data: comments, error: cErr } = await supabase
            .from("comments")
            .select("*")
            .eq("post_id", p.id)
            .order("created_at", { ascending: true });

          if (cErr) throw cErr;

          const list = card.querySelector(`[data-comments="${p.id}"]`);
          list.innerHTML = "";

          for (const c of (comments || [])) {
            const it = document.createElement("div");
            it.className = "commentItem";
            it.innerHTML = `
              <div style="font-weight:900;">${escapeHtml(c.user_username || "Utilisateur")}</div>
              <div>${escapeHtml(c.content || "")}</div>
              <div class="muted" style="margin-top:6px;">${new Date(c.created_at).toLocaleString()}</div>
            `;
            list.appendChild(it);
          }
        })();

        // Like
        card.querySelector(`[data-like="${p.id}"]`).addEventListener("click", async () => {
          try {
            const { data: { user } } = await supabase.auth.getUser();
            if (!user) return alert("Connecte-toi.");

            const already = likedByMe(p.id);

            if (already) {
              const { error: delErr } = await supabase
                .from("likes")
                .delete()
                .eq("post_id", p.id)
                .eq("user_id", user.id);
              if (delErr) throw delErr;
            } else {
              const { error: insErr } = await supabase
                .from("likes")
                .insert({ post_id: p.id, user_id: user.id });
              if (insErr) throw insErr;
            }

            await loadFeed();
          } catch (e) {
            alert(e?.message || String(e));
          }
        });

        // Comment
        card.querySelector(`[data-comment-send="${p.id}"]`).addEventListener("click", async () => {
          try {
            const { data: { user } } = await supabase.auth.getUser();
            if (!user) return alert("Connecte-toi.");

            const input = card.querySelector(`[data-comment-input="${p.id}"]`);
            const content = (input.value || "").trim();
            if (!content) return;

            const profile = await getMyProfile();

            const { error: insErr } = await supabase.from("comments").insert({
              post_id: p.id,
              user_id: user.id,
              user_username: profile.username,
              content
            });

            if (insErr) throw insErr;
            input.value = "";
            await loadFeed();
          } catch (e) {
            alert(e?.message || String(e));
          }
        });
      }
    }

    async function publish() {
      pubMsg.className = "muted";
      pubMsg.textContent = "";

      const file = mediaFileEl.files[0];
      const caption = (captionEl.value || "").trim();

      if (!file) throw new Error("Choisis une image ou une vidéo.");

      const mediaType = fileMediaType(file);
      if (!mediaType) throw new Error("Type média non supporté (image/vidéo uniquement).");

      const { data: { user } } = await supabase.auth.getUser();
      if (!user) throw new Error("Connecte-toi d’abord.");

      const profile = await getMyProfile();
      if (!profile?.username) throw new Error("Profil manquant. Mets ton username dans l’inscription.");

      pubMsg.textContent = "Upload média...";

      const ext = (file.name.includes(".") ? file.name.split(".").pop() : (mediaType === "image" ? "jpg" : "mp4")).toLowerCase();
      const path = `public/${user.id}/${crypto.randomUUID()}.${ext}`;

      const { error: upErr } = await supabase.storage
        .from("media")
        .upload(path, file, { upsert: false });

      if (upErr) throw upErr;

      const { data: urlData } = supabase.storage.from("media").getPublicUrl(path);

      const { error: insErr } = await supabase.from("posts").insert({
        user_id: user.id,
        user_username: profile.username,
        caption: caption || null,
        media_url: urlData.publicUrl,
        media_type: mediaType
      });

      if (insErr) throw insErr;

      captionEl.value = "";
      mediaFileEl.value = "";
      pubMsg.className = "ok";
      pubMsg.textContent = "Publié ✅";

      await loadFeed();
    }

    btnPublish.addEventListener("click", async () => {
      try {
        await publish();
      } catch (e) {
        pubMsg.className = "err";
        pubMsg.textContent = e?.message || String(e);
      }
    });

    btnSignup.addEventListener("click", async () => {
      signupMsg.className = "muted";
      signupMsg.textContent = "Création du compte...";

      try {
        const username = su_username.value.trim();
        const first_name = su_first.value.trim();
        const last_name = su_last.value.trim();
        const email = su_email.value.trim();
        const password = su_password.value;

        if (!username) throw new Error("Username requis.");
        if (!email) throw new Error("Email requis.");
        if (password.length < 6) throw new Error("Mot de passe trop court (min 6).");

        const { error } = await supabase.auth.signUp({
          email,
          password,
          options: { data: { username, first_name: first_name || null, last_name: last_name || null } }
        });

        if (error) throw error;
        signupMsg.className = "ok";
        signupMsg.textContent = "Compte créé ✅ (si confirmation email est activée, vérifie ta boîte mail).";
      } catch (e) {
        signupMsg.className = "err";
        signupMsg.textContent = e?.message || String(e);
      }
    });

    btnLogin.addEventListener("click", async () => {
      loginMsg.className = "muted";
      loginMsg.textContent = "Connexion...";

      try {
        const email = li_email.value.trim();
        const password = li_password.value;

        const { error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) throw error;

        loginMsg.className = "ok";
        loginMsg.textContent = "Connecté ✅";

        $("btnLogout").classList.remove("hide");
        await loadFeed();

        // Update summary
        const profile = await getMyProfile();
        authSummary.textContent = `Connecté en tant que : ${profile.username}`;
      } catch (e) {
        loginMsg.className = "err";
        loginMsg.textContent = e?.message || String(e);
      }
    });

    btnLogout.addEventListener("click", async () => {
      await supabase.auth.signOut();
      $("btnLogout").classList.add("hide");
      authSummary.textContent = "";
      feed.innerHTML = "";
      pubMsg.textContent = "";
      pubMsg.className = "muted";
    });

    btnReset.addEventListener("click", async () => {
      const email = (li_email.value || su_email.value || "").trim();
      if (!email) return alert("Entre d’abord ton email.");

      try {
        const redirectTo = window.location.origin + window.location.pathname;

        loginMsg.className = "muted";
        loginMsg.textContent = "Envoi lien reset...";

        const { error } = await supabase.auth.resetPasswordForEmail(email, { redirectTo });
        if (error) throw error;

        loginMsg.className = "ok";
        loginMsg.textContent = "Lien envoyé ✅ Vérifie tes emails.";
      } catch (e) {
        loginMsg.className = "err";
        loginMsg.textContent = e?.message || String(e);
      }
    });

    // Auth bootstrap
    supabase.auth.onAuthStateChange(async (_event, session) => {
      if (session?.user) {
        $("btnLogout").classList.remove("hide");
        const profile = await getMyProfile();
        authSummary.textContent = `Connecté en tant que : ${profile?.username || session.user.email}`;
        await loadFeed();
      } else {
        $("btnLogout").classList.add("hide");
        authSummary.textContent = "";
        feed.innerHTML = "";
      }
    });

    (async () => {
      const { data: { user } } = await supabase.auth.getUser();
      if (user) {
        $("btnLogout").classList.remove("hide");
        const profile = await getMyProfile();
        authSummary.textContent = `Connecté en tant que : ${profile?.username || user.email}`;
        await loadFeed();
      }
    })();
  </script>
</body>
</html>
