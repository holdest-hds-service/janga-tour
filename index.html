<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mini Social Media - Supabase</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial; margin: 16px; background:#0b0f19; color:#e8eefc; }
    .card { background:#111827; padding:16px; border-radius:12px; max-width:900px; margin: 0 auto 16px; box-shadow:0 10px 30px rgba(0,0,0,.25); }
    h1 { margin: 0 0 10px; font-size: 20px; }
    .grid { display:grid; grid-template-columns: 1fr; gap:16px; max-width:900px; margin:0 auto 40px; }
    .row { display:flex; gap:12px; flex-wrap:wrap; align-items:flex-start; }
    label { display:block; font-size: 13px; opacity:.9; margin-bottom:6px; }
    input, textarea, button { width:100%; border-radius:10px; padding:10px; border:1px solid #2b3550; background:#0b1220; color:#e8eefc; }
    textarea { min-height: 70px; resize: vertical; }
    button { cursor:pointer; background:#2563eb; border-color:#2563eb; font-weight:700; }
    button.secondary { background:#1f2937; border-color:#374151; font-weight:600; }
    .post { padding:14px; border:1px solid #26324f; border-radius:14px; background:#0f172a; }
    .meta { font-size: 12px; opacity:.85; margin-bottom:10px; }
    img, video { max-width: 100%; border-radius:12px; display:block; }
    .actions { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    .pill { padding:6px 10px; border-radius:999px; border:1px solid #26324f; background:#0b1220; font-size: 13px; }
    .comment { border-top:1px solid #26324f; margin-top:12px; padding-top:12px; }
    .error { color:#ff6b6b; font-weight:700; margin-top:8px; }
    .ok { color:#63ffb1; font-weight:700; margin-top:8px; }
    .username-banner { padding:12px; border-radius:12px; border:1px solid #26324f; background:#0f172a; margin-top:10px; }
    .username-banner input { width:100%; }
    @media (min-width: 900px) { .grid-cols { grid-template-columns: 380px 1fr; } }
  </style>
</head>
<body>

<div class="card grid grid-cols" style="grid-template-columns:1fr;">
  <div>
    <h1>Publier (upload media + post)</h1>
    <div style="display:flex;gap:12px;flex-direction:column;">
      <div>
        <label for="caption">Caption</label>
        <textarea id="caption" placeholder="Écris une description..."></textarea>
      </div>
      <div>
        <label for="mediaFile">Image ou vidéo</label>
        <input id="mediaFile" type="file" accept="image/*,video/*">
      </div>
      <button id="btnPublish">Publier</button>
      <div style="display:flex; gap:10px; margin-top:6px;">
        <button class="secondary" id="btnSignIn">Connexion (Email)</button>
      </div>
      <div style="display:flex; gap:10px; flex-wrap:wrap; margin-top:10px;">
        <div style="flex:1; min-width:220px;">
          <label for="email">Email</label>
          <input id="email" type="email" placeholder="email@exemple.com">
        </div>
        <div style="flex:1; min-width:220px;">
          <label for="redirect">Redirect URL (optionnel)</label>
          <input id="redirect" placeholder="ex: https://ton-site.com">
        </div>
      </div>
      <div id="status"></div>

      <!-- Username prompt -->
      <div id="usernamePrompt" class="username-banner" style="display:none;">
        <b>Choisis ton nom d'utilisateur</b>
        <div style="margin-top:10px;">
          <label for="usernameInput">Username</label>
          <input id="usernameInput" placeholder="ex: toto">
        </div>
        <div style="margin-top:10px;">
          <button class="secondary" id="btnSaveUsername" style="width:auto;">Sauvegarder</button>
        </div>
        <div id="usernamePromptStatus" class="error" style="display:none;"></div>
      </div>
    </div>
  </div>

  <div>
    <h1>Publications</h1>
    <div id="posts" class="grid" style="margin-top:8px;"></div>
  </div>
</div>

<script type="module">
  import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";
  
  // === À REMPLACER ===
  const SUPABASE_URL = "https://wtsmekozfpeaixqobuik.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind0c21la296ZnBlYWl4cW9idWlrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4Mjk2MjcsImV4cCI6MjA5MzQwNTYyN30.AUm9renaVr3A8pzDNx5Dm_f4XJrhkIKlnUePm6Gl5S0";
  // === Fin ===
  
  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
    auth: { persistSession: true }
  });
  
  const postsEl = document.getElementById("posts");
  const statusEl = document.getElementById("status");
  const usernamePrompt = document.getElementById("usernamePrompt");
  const usernameInput = document.getElementById("usernameInput");
  const btnSaveUsername = document.getElementById("btnSaveUsername");
  const usernamePromptStatus = document.getElementById("usernamePromptStatus");
  
  function showStatus(msg, type = "ok") {
    statusEl.className = type === "error" ? "error" : "ok";
    statusEl.textContent = msg;
  }
  
  function detectMediaType(file) {
    if (!file) return null;
    if (file.type.startsWith("image/")) return "image";
    if (file.type.startsWith("video/")) return "video";
    return null;
  }
  
  async function uploadToStorage(file) {
    const mediaType = detectMediaType(file);
    if (!mediaType) throw new Error("Type média non supporté.");
    const bucket = "media";
    const ext = file.name.includes(".") ? file.name.split(".").pop() : (mediaType === "image" ? "jpg" : "mp4");
    const path = `public/${crypto.randomUUID()}.${ext}`;
    const { error: uploadErr } = await supabase.storage.from(bucket).upload(path, file, { upsert: false });
    if (uploadErr) throw uploadErr;
    const { data: pub } = supabase.storage.from(bucket).getPublicUrl(path);
    return { url: pub.publicUrl, mediaType };
  }
  
  async function getUsernameForCurrentUser() {
    const { data: { user } } = await supabase.auth.getUser();
    if (!user) return null;
    const { data, error } = await supabase
      .from("profiles")
      .select("username")
      .eq("id", user.id)
      .single();
    if (error) return null;
    return data?.username ?? null;
  }
  
  async function ensureUsername() {
    const { data: { user } } = await supabase.auth.getUser();
    if (!user) {
      usernamePrompt.style.display = "none";
      return { user: null, username: null };
    }
    const username = await getUsernameForCurrentUser();
    if (!username) {
      usernamePromptStatus.style.display = "none";
      usernameInput.value = "";
      usernamePrompt.style.display = "block";
      return { user, username: null };
    }
    usernamePrompt.style.display = "none";
    return { user, username };
  }
  
  btnSaveUsername.addEventListener("click", async () => {
    usernamePromptStatus.style.display = "none";
    const { data: { user } } = await supabase.auth.getUser();
    if (!user) return showStatus("Connecte-toi d'abord.", "error");
    const uname = (usernameInput.value || "").trim();
    if (!uname) {
      usernamePromptStatus.textContent = "Username requis.";
      usernamePromptStatus.style.display = "block";
      return;
    }
    const { error } = await supabase
      .from("profiles")
      .upsert({ id: user.id, username: uname });
    if (error) {
      usernamePromptStatus.textContent = error.message || "Erreur lors de la sauvegarde du username.";
      usernamePromptStatus.style.display = "block";
      return;
    }
    showStatus("Username sauvegardé ✅");
    usernamePrompt.style.display = "none";
    await loadPosts();
  });
  
  async function loadPosts() {
    postsEl.innerHTML = "";
    const { data: posts, error } = await supabase
      .from("posts")
      .select("*")
      .order("created_at", { ascending: false });
    if (error) throw error;
    
    const ids = posts.map(p => p.id);
    let likesMap = {};
    if (ids.length) {
      const { data: likes, error: likesErr } = await supabase
        .from("likes")
        .select("post_id");
      if (likesErr) throw likesErr;
      likesMap = likes.reduce((acc, l) => {
        acc[l.post_id] = (acc[l.post_id] || 0) + 1;
        return acc;
      }, {});
    }
    
    for (const p of posts) {
      const likesCount = likesMap[p.id] || 0;
      const name = p.user_name || "Utilisateur";
      const postDiv = document.createElement("div");
      postDiv.className = "post";
      postDiv.innerHTML = `
        <div class="meta">
          <b>${escapeHtml(name)}</b> • ${new Date(p.created_at).toLocaleString()}
        </div>
        ${p.caption ? `<div style="margin-bottom:10px; font-weight:600;">${escapeHtml(p.caption)}</div>` : ""}
        ${p.media_url ? `
          <div class="media">
            ${p.media_type === "video"
              ? `<video src="${p.media_url}" controls playsinline></video>`
              : `<img src="${p.media_url}" alt="media" />`
            }
          </div>
        ` : ""}
        <div class="actions">
          <button class="secondary" data-like="${p.id}">❤️ Like</button>
          <span class="pill">${likesCount} likes</span>
        </div>
        <div class="comment">
          <div style="display:flex;gap:10px;">
            <input placeholder="Écrire un commentaire..." data-comment-input="${p.id}" style="padding:10px;">
            <button data-comment-send="${p.id}" style="width:auto; padding:10px 14px;">Envoyer</button>
          </div>
          <div data-comments-list="${p.id}" style="margin-top:12px;"></div>
        </div>
      `;
      postsEl.appendChild(postDiv);
      await loadCommentsForPost(p.id, postDiv.querySelector(`[data-comments-list="${p.id}"]`));
    }
    
    postsEl.querySelectorAll("[data-like]").forEach(btn => {
      btn.addEventListener("click", async () => {
        const postId = btn.getAttribute("data-like");
        await likePost(postId);
        await loadPosts();
      });
    });
    
    postsEl.querySelectorAll("[data-comment-send]").forEach(btn => {
      btn.addEventListener("click", async () => {
        const postId = btn.getAttribute("data-comment-send");
        const input = postsEl.querySelector(`[data-comment-input="${postId}"]`);
        const text = (input?.value || "").trim();
        if (!text) return;
        await addComment(postId, text);
        await loadPosts();
      });
    });
  }
  
  async function loadCommentsForPost(postId, container) {
    container.innerHTML = "";
    const { data, error } = await supabase
      .from("comments")
      .select("*")
      .eq("post_id", postId)
      .order("created_at", { ascending: true });
    if (error) throw error;
    
    for (const c of data) {
      const el = document.createElement("div");
      el.style.marginBottom = "10px";
      el.innerHTML = `
        <p style="font-weight:650;">${escapeHtml(c.user_name || "Utilisateur")}: ${escapeHtml(c.content)}</p>
        <small>${new Date(c.created_at).toLocaleString()}</small>
      `;
      container.appendChild(el);
    }
  }
  
  async function likePost(postId) {
    const { data: { user } } = await supabase.auth.getUser();
    if (!user) throw new Error("Connecte-toi d'abord.");
    const { error } = await supabase
      .from("likes")
      .insert({ post_id: postId, user_id: user.id });
    if (error && !String(error.message || "").toLowerCase().includes("duplicate")) throw error;
  }
  
  async function addComment(postId, content) {
    const { data: { user } } = await supabase.auth.getUser();
    if (!user) throw new Error("Connecte-toi d'abord.");
    const username = await getUsernameForCurrentUser() || user.email || "Utilisateur";
    const { error } = await supabase.from("comments").insert({
      post_id: postId,
      user_id: user.id,
      user_name: username,
      content
    });
    if (error) throw error;
  }
  
  function escapeHtml(str) {
    return String(str ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }
  
  // Connexion OTP
  document.getElementById("btnSignIn").addEventListener("click", async () => {
    const email = document.getElementById("email").value.trim();
    const redirectTo = document.getElementById("redirect").value.trim() || window.location.origin;
    if (!email) return showStatus("Entre un email.", "error");
    showStatus("Envoi du lien de connexion...");
    const { error } = await supabase.auth.signInWithOtp({
      email,
      options: { emailRedirectTo: redirectTo }
    });
    if (error) return showStatus(error.message, "error");
    showStatus("Vérifie ta boîte mail et clique sur le lien.");
  });
  
  // Publier
  document.getElementById("btnPublish").addEventListener("click", async () => {
    try {
      const caption = document.getElementById("caption").value.trim();
      const file = document.getElementById("mediaFile").files[0];
      if (!file) return showStatus("Choisis une image ou vidéo.", "error");
      const { data: { user } } = await supabase.auth.getUser();
      if (!user) throw new Error("Connecte-toi d'abord.");
      
      const { username } = await ensureUsername();
      if (!username) {
        showStatus("Choisis ton username d'abord.", "error");
        return;
      }
      
      showStatus("Upload en cours...");
      const { url, mediaType } = await uploadToStorage(file);
      const { error } = await supabase.from("posts").insert({
        user_id: user.id,
        user_name: username,
        caption,
        media_url: url,
        media_type: mediaType
      });
      if (error) throw error;
      
      showStatus("Publié ✅");
      document.getElementById("caption").value = "";
      document.getElementById("mediaFile").value = "";
      await loadPosts();
    } catch (e) {
      showStatus(e.message || String(e), "error");
    }
  });
  
  // Initial load
  supabase.auth.getSession().then(async () => {
    await ensureUsername();
    await loadPosts();
  }).catch(async () => {
    usernamePrompt.style.display = "none";
    await loadPosts();
  });
  
  supabase.auth.onAuthStateChange(async () => {
    await ensureUsername();
    await loadPosts();
  });
</script>

</body>
</html>
